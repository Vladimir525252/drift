<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Танчики 3D</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
}
</style>
</head>
<body>
<div id="ui">HP: <span id="hp">100</span></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// свет
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// земля
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// препятствия
let obstacles = [];
for(let i=0;i<10;i++){
  let box = new THREE.Mesh(
    new THREE.BoxGeometry(3,3,3),
    new THREE.MeshStandardMaterial({color:0x888888})
  );
  box.position.set(
    (Math.random()-0.5)*50,
    1.5,
    (Math.random()-0.5)*50
  );
  scene.add(box);
  obstacles.push(box);
}

// создание танка
function createTank(color){
  let tank = new THREE.Group();

  let body = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,3),
    new THREE.MeshStandardMaterial({color})
  );

  let turret = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,0.5,1.5),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  turret.position.y = 0.75;

  tank.add(body);
  tank.add(turret);
  scene.add(tank);

  tank.turret = turret;
  tank.hp = 100;
  return tank;
}

// игрок
let player = createTank(0x00ff00);
player.position.set(0,0.5,0);

// боты
let bots = [];
for(let i=0;i<3;i++){
  let bot = createTank(0xff0000);
  bot.position.set((Math.random()-0.5)*40,0.5,(Math.random()-0.5)*40);
  bots.push(bot);
}

// управление
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// пули
let bullets = [];

function shoot(tank){
  let bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  bullet.position.copy(tank.position);
  bullet.direction = new THREE.Vector3(0,0,-1).applyQuaternion(tank.quaternion);
  scene.add(bullet);
  bullets.push(bullet);
}

document.addEventListener("keydown", e=>{
  if(e.code === "Space") shoot(player);
});

// движение игрока
function updatePlayer(){
  let speed = 0.2;
  if(keys["w"]) player.translateZ(-speed);
  if(keys["s"]) player.translateZ(speed);
  if(keys["a"]) player.rotation.y += 0.05;
  if(keys["d"]) player.rotation.y -= 0.05;

  if(keys["arrowleft"]) player.turret.rotation.y += 0.05;
  if(keys["arrowright"]) player.turret.rotation.y -= 0.05;
}

// простейший ИИ ботов (обход препятствий + движение к игроку)
function updateBots(){
  bots.forEach(bot=>{
    let dir = new THREE.Vector3().subVectors(player.position, bot.position).normalize();

    // обход препятствий
    obstacles.forEach(o=>{
      let dist = bot.position.distanceTo(o.position);
      if(dist < 5){
        dir.add(new THREE.Vector3(
          bot.position.x - o.position.x,
          0,
          bot.position.z - o.position.z
        ).normalize());
      }
    });

    bot.position.add(dir.multiplyScalar(0.05));
    bot.lookAt(player.position);

    if(Math.random() < 0.01) shoot(bot);
  });
}

// пули и попадания
function updateBullets(){
  bullets.forEach((b,i)=>{
    b.position.add(b.direction.clone().multiplyScalar(0.5));

    // попадание в игрока
    if(b.position.distanceTo(player.position) < 1){
      player.hp -= 5;
      document.getElementById("hp").innerText = player.hp;
      scene.remove(b);
      bullets.splice(i,1);
    }

    // попадание в бота
    bots.forEach(bot=>{
      if(b.position.distanceTo(bot.position) < 1){
        bot.hp -= 10;
        if(bot.hp <= 0){
          scene.remove(bot);
        }
        scene.remove(b);
      }
    });
  });
}

// камера
camera.position.set(0,10,10);

function animate(){
  requestAnimationFrame(animate);

  updatePlayer();
  updateBots();
  updateBullets();

  camera.lookAt(player.position);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
