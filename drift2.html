<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Drift Simulator FIX</title>
<style>
body { margin: 0; overflow: hidden; background: #000; }
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
}
</style>
</head>
<body>

<div id="info">W/S — газ/тормоз | A/D — поворот | SPACE — дрифт</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer;
let car;
let velocity = 0;
let direction = 0;
let keys = {};

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // Свет
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 10, 5);
    scene.add(light);

    // Земля (светлее!)
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshStandardMaterial({ color: 0x555555 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Fallback машина (чтобы точно было видно)
    car = new THREE.Mesh(
        new THREE.BoxGeometry(2, 1, 4),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    car.position.y = 0.5;
    scene.add(car);

    // Попытка загрузить модель
    const loader = new THREE.GLTFLoader();

    loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/VC/glTF/VC.gltf',
        function (gltf) {
            scene.remove(car); // удаляем куб
            car = gltf.scene;
            car.scale.set(1, 1, 1);
            car.position.y = 0.5;
            scene.add(car);
        },
        undefined,
        function (error) {
            console.log("Ошибка загрузки модели, используем куб");
        }
    );

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
}

function update() {
    if (!car) return;

    if (keys['KeyW']) velocity += 0.02;
    if (keys['KeyS']) velocity -= 0.03;

    velocity *= 0.98;

    if (keys['KeyA']) direction += 0.03;
    if (keys['KeyD']) direction -= 0.03;

    let drift = keys['Space'] ? 0.9 : 1;

    car.rotation.y += direction * velocity * 0.5;

    car.position.x += Math.sin(car.rotation.y) * velocity * drift;
    car.position.z += Math.cos(car.rotation.y) * velocity * drift;

    camera.position.x = car.position.x - Math.sin(car.rotation.y) * 8;
    camera.position.z = car.position.z - Math.cos(car.rotation.y) * 8;
    camera.position.y = 4;

    camera.lookAt(car.position);
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
</script>

</body>
</html>
